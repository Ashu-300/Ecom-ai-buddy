# ===================== Monolith Deployment =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monolith-deployment
  namespace: default
  labels:
    app: monolith
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monolith
  template:
    metadata:
      labels:
        app: monolith
    spec:
      containers:
        - name: monolith
          image: ashutoshnigam300/monolith:latest
          ports:
            - containerPort: 8080

---
# ===================== Monolith Service =====================
apiVersion: v1
kind: Service
metadata:
  name: monolith-service
  namespace: default
  labels:
    app: monolith
spec:
  selector:
    app: monolith
  ports:
    - name: http              # ✅ MUST match ServiceMonitor
      protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP            # ✅ changed (see explanation)